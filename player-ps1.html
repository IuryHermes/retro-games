<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>NeoTerminal Room - PS1 High Performance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="coi-serviceworker.js"></script>

    <style>
        html, body { margin: 0; background: #000; width: 100%; height: 100dvh; overflow: hidden; }
        #game { width: 100vw; height: 100dvh; background-color: #000; }
    </style>
</head>
<body>

    <div id="game"></div>

    <script type="text/javascript">
        const params = new URLSearchParams(window.location.search);
        
        window.EJS_player = '#game';
        
        // 2. MUDANÇA DE CORE: pcsx_rearmed é muito mais rápido
        window.EJS_core = 'pcsx_rearmed';  
        
        window.EJS_gameUrl = params.get("game");
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
        window.EJS_language = "en-US"; 

        // 3. BIOS REAL: Melhora a compatibilidade e tira peso da CPU
        // Certifique-se de que o arquivo scph5501.bin está nesse caminho no seu R2
        window.EJS_biosUrl = 'https://pub-44d40f83db2141efb7e8a7658c74557e.r2.dev/systems/ps1/roms/scph5501.bin';

        // 4. OTIMIZAÇÕES EXTRAS
        window.EJS_threads = true; // Força o uso de múltiplos núcleos
        window.EJS_WS = true;      // WebAssembly acelerado
    </script>
    
    <script src="https://cdn.emulatorjs.org/latest/data/loader.js"></script>
</body>
</html>
