<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>NeoTerminal Room - PS1 Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { margin: 0; background: #000; width: 100%; height: 100dvh; overflow: hidden; }
        #game { width: 100vw; height: 100dvh; }
        #loading-overlay { position: fixed; inset: 0; background: #000; z-index: 99; display: flex; justify-content: center; align-items: center; color: #00ff44; font-family: monospace; }
    </style>
</head>
<body>
    <div id="loading-overlay">SISTEMA PS1 INICIALIZANDO...</div>
    <div id="game"></div>

    <script type="text/javascript">
        // 1. LIMPEZA TOTAL (Obrigatório para remover o fantasma da Nintendo)
        localStorage.clear();
        sessionStorage.clear();

        // 2. CONFIGURAÇÃO DE ACORDO COM A DOCUMENTAÇÃO V4
        const params = new URLSearchParams(window.location.search);
        
        window.EJS_player = '#game';
        window.EJS_core = 'psx'; // Aciona o núcleo pcsx_rearmed automaticamente
        window.EJS_gameUrl = params.get("game");
        window.EJS_biosUrl = 'https://pub-44d40f83db2141efb7e8a7658c74557e.r2.dev/systems/ps1/roms/scph5501.bin';
        
        // APONTANDO PARA A CDN OFICIAL (Para evitar erros 404 de texturas)
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        window.EJS_startOnLoaded = true;
        window.EJS_language = "pt-BR";
        window.EJS_backgroundColor = "#000000";

        // 3. O SEGREDO DO CONTROLE (A skin "playstation" existe na CDN mas precisa ser chamada assim)
        window.EJS_VirtualGamepadSettings = { 
            buttonStyle: "playstation" 
        };

        // 4. CORREÇÃO DO LAG (Performance para o GitHub Pages)
        window.EJS_defaultOptions = {
            "vsync": false,  // Desligado para evitar input lag
            "quality": 1,    // 1 = Performance (Essencial para mobile)
            "threads": false // GitHub Pages não suporta SharedArrayBuffer, então deixe em FALSE para não travar
        };

        window.EJS_onGameStart = () => {
            document.getElementById('loading-overlay').remove();
        };
    </script>
    
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
