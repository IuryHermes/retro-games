<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>NeoTerminal Room - PS1 Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        html, body { margin: 0; background: #000; width: 100%; height: 100dvh; overflow: hidden; }
        #game { width: 100vw; height: 100dvh; background-color: #000; }

        /* ========================================================== */
        /* HACK DE BOTÕES PS1 (Apaga as letras e injeta os botões da Sony) */
        /* ========================================================== */
        [data-button="BUTTON_1"] { background: #5a6eb1 !important; color: transparent !important; } /* Cruz */
        [data-button="BUTTON_1"]::after { content: "✖"; color: #fff !important; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }
        
        [data-button="BUTTON_2"] { background: #cc3d3d !important; color: transparent !important; } /* Círculo */
        [data-button="BUTTON_2"]::after { content: "●"; color: #fff !important; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        [data-button="BUTTON_3"] { background: #b15ab1 !important; color: transparent !important; } /* Quadrado */
        [data-button="BUTTON_3"]::after { content: "■"; color: #fff !important; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        
        [data-button="BUTTON_4"] { background: #3d8c3d !important; color: transparent !important; } /* Triângulo */
        [data-button="BUTTON_4"]::after { content: "▲"; color: #fff !important; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        [data-button] span { display: none !important; }
    </style>
</head>
<body>

    <div id="game"></div>

    <script type="text/javascript">
        const params = new URLSearchParams(window.location.search);
        
        window.EJS_player = '#game';
        window.EJS_core = 'psx';  
        window.EJS_gameUrl = params.get("game");
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
        
        // Mantemos o idioma em inglês para evitar erro 404
        window.EJS_language = "en-US"; 
        
        // ==========================================================
        // OTIMIZAÇÕES MÁXIMAS PARA REDUZIR TRAVAMENTOS NO PS1
        // ==========================================================
        window.EJS_defaultOptions = { 
            "vsync": false,       // Desliga VSYNC (Essencial para não travar)
            "quality": 1,         // Prioriza performance em vez de shaders pesados
            "audio-latency": 2    // Reduz travadinhas no som
        };

        // Força a exibição dos controles na tela para o mobile e aplica o estilo "moderno"
        window.EJS_VirtualGamepadSettings = { 
            buttonStyle: "modern", 
            opacity: 0.7 
        };
    </script>
    
    <script src="https://cdn.emulatorjs.org/latest/data/loader.js"></script>
</body>
</html>
