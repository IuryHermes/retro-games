<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>NeoTerminal Room - PS1 Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { margin: 0; background: #000; width: 100%; height: 100dvh; overflow: hidden; }
        #game { width: 100vw; height: 100dvh; }

        /* TELA DE LOADING */
        #loader-overlay { position: fixed; inset: 0; background: #000; z-index: 9999998; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        .ps1-bar-container { width: 200px; height: 6px; border: 1px solid #333; background: #111; overflow: hidden; border-radius: 10px; margin-top: 10px; }
        #ps1-bar-fill { width: 0%; height: 100%; background: #00ff44; transition: width 0.2s ease-out; }

        /* INJETOR DE SKIN PS1 VIA CSS (RESOLVE O PROBLEMA DO CDN) */
        /* Isso troca visualmente o texto dos botões sem gastar CPU */
        div[id*="MODERN_BUTTON_1"] { color: transparent !important; }
        div[id*="MODERN_BUTTON_1"]::after { content: "✖"; color: #738adb; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; text-shadow: 0 0 5px #000; }

        div[id*="MODERN_BUTTON_2"] { color: transparent !important; }
        div[id*="MODERN_BUTTON_2"]::after { content: "●"; color: #eb4e4e; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; text-shadow: 0 0 5px #000; }

        div[id*="MODERN_BUTTON_3"] { color: transparent !important; }
        div[id*="MODERN_BUTTON_3"]::after { content: "■"; color: #f591f5; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; text-shadow: 0 0 5px #000; }

        div[id*="MODERN_BUTTON_4"] { color: transparent !important; }
        div[id*="MODERN_BUTTON_4"]::after { content: "▲"; color: #44d481; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>
    <div id="loader-overlay">
        <div style="color:#fff; font-family:monospace;">INICIALIZANDO PS1...</div>
        <div class="ps1-bar-container"><div id="ps1-bar-fill"></div></div>
    </div>
    <div id="game"></div>

    <script>
        // Limpeza de cache antes de tudo
        localStorage.clear();

        window.history.pushState({page: 1}, "", "");
        window.addEventListener('popstate', function() { window.location.href = "index.html"; });

        const params = new URLSearchParams(window.location.search);
        const gameUrl = params.get("game");

        window.EJS_player = '#game';
        window.EJS_core = 'pcsx_rearmed'; // Core veloz
        window.EJS_biosUrl = 'https://pub-44d40f83db2141efb7e8a7658c74557e.r2.dev/systems/ps1/roms/scph5501.bin';
        window.EJS_gameUrl = gameUrl;
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        window.EJS_startOnLoaded = true;
        window.EJS_language = "pt-BR";

        // Mapeamento de botões L1, L2, R1, R2 habilitado pelo modo "modern"
        window.EJS_VirtualGamepadSettings = {
            buttonStyle: "modern",
            opacity: 0.5
        };

        // CORREÇÃO DO LAG: Colocando as opções na variável correta
        window.EJS_defaultOptions = {
            "vsync": false,
            "quality": 1,
            "slowdown": false,
            "audio_buffer": 2048,
            "threads": true
        };

        window.EJS_buttons = { save_state: true, load_state: true, settings: true, menu: true };

        let progress = 0;
        let barFill = document.getElementById('ps1-bar-fill');
        let loadingInterval = setInterval(() => {
            progress += (98 - progress) * 0.01;
            if(barFill) barFill.style.width = progress + '%';
        }, 100);

        window.EJS_onGameStart = function() {
            clearInterval(loadingInterval);
            document.getElementById('loader-overlay').style.display = 'none';
        };
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
