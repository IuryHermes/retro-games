<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>NeoTerminal Room - Debug PS1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        html, body { margin: 0; background: #000; width: 100%; height: 100dvh; overflow: hidden; }
        #game { width: 100vw; height: 100dvh; background-color: #000; }
    </style>
</head>
<body>

    <div id="game"></div>

    <script type="text/javascript">
        const params = new URLSearchParams(window.location.search);
        
        window.EJS_player = '#game';
        window.EJS_core = 'psx';  
        window.EJS_gameUrl = params.get("game");
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
        
        // Mantemos o idioma em inglês para evitar o erro 404 anterior
        window.EJS_language = "en-US"; 
        
        // Removi temporariamente a BIOS do seu R2 para ver se o emulador liga com a BIOS genérica (HLE).
        // Se a BIOS estava bloqueando o Module, agora ele vai pular ela.
    </script>
    
    <script src="https://cdn.emulatorjs.org/latest/data/loader.js"></script>
</body>
</html>
