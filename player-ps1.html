<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>NeoTerminal Room - PS1 Exclusive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { margin: 0; background: #000; width: 100%; height: 100dvh; overflow: hidden; }
        #game { width: 100vw; height: 100dvh; }
        #status-bar { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #00ff44; font-family: monospace; }
        .spinner { width: 40px; height: 40px; border: 4px solid #111; border-top: 4px solid #00ff44; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="status-bar">
        <div class="spinner"></div>
        <div id="msg">CARREGANDO NÚCLEO PSX (WASM)...</div>
    </div>

    <div id="game"></div>

    <script type="text/javascript">
        // Seta de voltar nativa do celular
        window.history.pushState({page: 1}, "", ""); 
        window.addEventListener('popstate', () => { window.location.href = "index.html"; });

        const params = new URLSearchParams(window.location.search);
        const gameUrl = params.get("game");

        // VARIÁVEIS GLOBAIS DA V4 (Conforme sua pesquisa)
        window.EJS_player = '#game';
        window.EJS_core = 'psx'; // Aciona o pcsx_rearmed via manifesto .json
        window.EJS_gameUrl = gameUrl;
        
        // BIOS - Obrigatória para não dar tela preta
        window.EJS_biosUrl = 'https://pub-44d40f83db2141efb7e8a7658c74557e.r2.dev/systems/ps1/roms/scph5501.bin';
        
        // APONTANDO PARA A SUA PASTA LOCAL NO GITHUB
        window.EJS_pathtodata = 'emu-ps1/data/'; 

        window.EJS_startOnLoaded = true;
        window.EJS_language = "pt-BR";
        window.EJS_backgroundColor = "#000000";

        // CONTROLE PLAYSTATION (A skin que você quer)
        window.EJS_VirtualGamepadSettings = { 
            buttonStyle: "playstation",
            opacity: 0.7
        };

        // PERFORMANCE (VSYNC OFF conforme sua pesquisa para evitar lag)
        window.EJS_defaultOptions = {
            "vsync": false,
            "quality": 1, 
            "audio_buffer": 2048
        };

        window.EJS_onGameStart = () => {
            document.getElementById('status-bar').style.display = 'none';
        };

        // Limpa cache de lixo de outros emuladores
        localStorage.clear();
    </script>

    <script src="emu-ps1/loader.js"></script>
</body>
</html>
