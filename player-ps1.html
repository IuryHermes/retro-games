<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>NeoTerminal Room - PS1 Online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        html, body { margin: 0; background: #000; width: 100%; height: 100dvh; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #game { width: 100vw; height: 100dvh; background-color: #000; }
        
        /* TELA DE LOADING PADRONIZADA */
        #loader-overlay { position: fixed; inset: 0; background: #000; z-index: 9999998; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; pointer-events: none; }
        #ps1-text { color: #fff; font-size: 16px; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; text-align: center; }
        .ps1-bar-container { width: 280px; height: 15px; border: 2px solid #fff; padding: 2px; background: #000; }
        #ps1-bar-fill { 
            width: 0%; height: 100%; 
            background: linear-gradient(45deg, #00ff44 25%, #00cc33 25%, #00cc33 50%, #00ff44 50%, #00ff44 75%, #00cc33 75%, #00cc33 100%);
            background-size: 20px 20px;
            animation: moveStripes 1s linear infinite;
        }
        @keyframes moveStripes { 0% { background-position: 0 0; } 100% { background-position: 20px 0; } }
        .blink { animation: blink 1.5s infinite; color: #00ff44;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* INJEÇÃO DE SÍMBOLOS PS1 VIA CSS (À PROVA DE ERRO DE IMAGEM) */
        div[id*="MODERN_BUTTON_1"] span, div[data-button="BUTTON_1"] span { display: none !important; }
        div[id*="MODERN_BUTTON_1"]::before, div[data-button="BUTTON_1"]::before { content: "✖"; color: #738adb; font-size: 24px; font-weight: bold; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        
        div[id*="MODERN_BUTTON_2"] span, div[data-button="BUTTON_2"] span { display: none !important; }
        div[id*="MODERN_BUTTON_2"]::before, div[data-button="BUTTON_2"]::before { content: "●"; color: #eb4e4e; font-size: 24px; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        
        div[id*="MODERN_BUTTON_3"] span, div[data-button="BUTTON_3"] span { display: none !important; }
        div[id*="MODERN_BUTTON_3"]::before, div[data-button="BUTTON_3"]::before { content: "■"; color: #f591f5; font-size: 28px; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
        
        div[id*="MODERN_BUTTON_4"] span, div[data-button="BUTTON_4"] span { display: none !important; }
        div[id*="MODERN_BUTTON_4"]::before, div[data-button="BUTTON_4"]::before { content: "▲"; color: #44d481; font-size: 24px; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div id="ps1-text">CARREGANDO PS1...<br><span class="blink" style="font-size: 12px;">[ CONECTANDO AO SERVIDOR ]</span></div>
        <div class="ps1-bar-container"><div id="ps1-bar-fill"></div></div>
    </div>

    <div id="game"></div>

    <script type="text/javascript">
        localStorage.clear();
        window.history.pushState({page: 1}, "", ""); 
        window.addEventListener('popstate', () => { window.location.href = "index.html"; });

        const params = new URLSearchParams(window.location.search);
        
        window.EJS_player = '#game';
        window.EJS_core = 'psx'; 
        window.EJS_gameUrl = params.get("game");
        window.EJS_biosUrl = 'https://pub-44d40f83db2141efb7e8a7658c74557e.r2.dev/systems/ps1/roms/scph5501.bin';
        
        // PUXANDO TUDO DA INTERNET (CDN)
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        window.EJS_startOnLoaded = true;
        window.EJS_language = "pt-BR";
        window.EJS_backgroundColor = "#000000";
        window.EJS_VirtualGamepadSettings = { buttonStyle: "modern", opacity: 0.7 };
        window.EJS_defaultOptions = { "vsync": false, "quality": 1, "threads": false };

        let progress = 0;
        let barFill = document.getElementById('ps1-bar-fill');
        let loadingInterval = setInterval(() => {
            progress += (99.5 - progress) * 0.005;
            if(barFill) barFill.style.width = progress + '%';
        }, 50); 

        window.EJS_onGameStart = () => {
            clearInterval(loadingInterval);
            document.getElementById('loader-overlay').remove();
        };
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
