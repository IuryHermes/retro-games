<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>NeoTerminal Room - PS1 Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        /* TUDO PRETO E LIMPO */
        html, body { margin: 0; background: #000; width: 100%; height: 100dvh; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #game { width: 100vw; height: 100dvh; background-color: #000; }
        
        /* A BARRA DE CARREGAMENTO QUE VOCÊ GOSTOU */
        #loader-overlay { position: fixed; inset: 0; background: #000; z-index: 9999999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; pointer-events: none; }
        #loading-text { color: #fff; font-size: 16px; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; text-align: center; line-height: 1.5; }
        .bar-container { width: 280px; height: 15px; border: 2px solid #fff; padding: 2px; background: #000; }
        
        #bar-fill { 
            width: 0%; height: 100%; 
            background: linear-gradient(45deg, #00ff44 25%, #00cc33 25%, #00cc33 50%, #00ff44 50%, #00ff44 75%, #00cc33 75%, #00cc33 100%);
            background-size: 20px 20px;
            animation: moveStripes 1s linear infinite;
            transition: width 0.1s linear; 
        }
        
        @keyframes moveStripes { 0% { background-position: 0 0; } 100% { background-position: 20px 0; } }
        .blink { animation: blink 1.5s infinite; color: #00ff44;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* HACK DEFINITIVO PARA OS BOTÕES (Caso o servidor deles mande o de Nintendo) */
        div[id*="MODERN_BUTTON_1"]::after { content: "✖" !important; color: #738adb !important; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; background: #222; border-radius: 50%; }
        div[id*="MODERN_BUTTON_2"]::after { content: "●" !important; color: #eb4e4e !important; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; background: #222; border-radius: 50%; }
        div[id*="MODERN_BUTTON_3"]::after { content: "■" !important; color: #f591f5 !important; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; background: #222; border-radius: 50%; }
        div[id*="MODERN_BUTTON_4"]::after { content: "▲" !important; color: #44d481 !important; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; background: #222; border-radius: 50%; }
        div[id*="MODERN_BUTTON"] span { display: none !important; }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div id="loading-text">
            INICIALIZANDO PS1<span id="dots">...</span><br>
            <span class="blink" style="font-size: 12px;">[ ACESSANDO NÚCLEO EXTERNO ]</span>
        </div>
        <div class="bar-container">
            <div id="bar-fill"></div>
        </div>
    </div>

    <div id="game"></div>

    <script type="text/javascript">
        // Limpa lixo de cache
        localStorage.clear();
        
        // Seta de voltar do celular volta pro site
        window.history.pushState({page: 1}, "", ""); 
        window.addEventListener('popstate', () => { window.location.href = "index.html"; });

        const params = new URLSearchParams(window.location.search);
        
        // CONFIGURAÇÃO 100% EXTERNA
        window.EJS_player = '#game';
        window.EJS_core = 'psx'; 
        window.EJS_gameUrl = params.get("game");
        window.EJS_biosUrl = 'https://pub-44d40f83db2141efb7e8a7658c74557e.r2.dev/systems/ps1/roms/scph5501.bin';
        
        // PUXA TUDO DO SERVIDOR DELES (LATEST É O MAIS ATUALIZADO)
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';

        window.EJS_startOnLoaded = true;
        window.EJS_language = "pt-BR";
        window.EJS_backgroundColor = "#000000";

        // Força o estilo PlayStation e o layout Modern (L1, L2, R1, R2)
        window.EJS_VirtualGamepadSettings = { buttonStyle: "playstation", opacity: 0.7 };
        window.EJS_gamepadStyle = "playstation";

        // PERFORMANCE (SEM TRAVAR)
        window.EJS_defaultOptions = { "vsync": false, "quality": 1, "threads": false };

        // Animação da barra de loading
        let progress = 0;
        let dotCount = 0;
        let barFill = document.getElementById('bar-fill');
        let dotsEl = document.getElementById('dots');
        
        let loadingInterval = setInterval(() => {
            progress += (99.5 - progress) * 0.005;
            if(barFill) barFill.style.width = progress + '%';
            dotCount = (dotCount + 1) % 4;
            if(dotsEl) dotsEl.innerText = ".".repeat(dotCount);
        }, 50); 

        window.EJS_onGameStart = () => {
            clearInterval(loadingInterval);
            const loader = document.getElementById('loader-overlay');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        };
    </script>
    
    <script src="https://cdn.emulatorjs.org/latest/data/loader.js"></script>
</body>
</html>
