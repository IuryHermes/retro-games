<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>NeoTerminal Room - PS1 Pro Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <style>
        html, body { margin: 0; background: #000; width: 100%; height: 100dvh; overflow: hidden; }
        #game { width: 100vw; height: 100dvh; }
        
        /* TELA DE LOADING PROFISSIONAL */
        #loader-overlay { position: fixed; inset: 0; background: #000; z-index: 9999998; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; }
        #ps1-text { color: #fff; font-family: monospace; font-size: 14px; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; text-align: center; letter-spacing: 1px; }
        .ps1-bar-container { width: 200px; height: 6px; border: 1px solid #333; background: #111; overflow: hidden; border-radius: 10px; }
        #ps1-bar-fill { 
            width: 0%; height: 100%; 
            background: #00ff44;
            box-shadow: 0 0 10px #00ff44;
            transition: width 0.2s ease-out;
        }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div id="ps1-text" class="blink">INICIALIZANDO HARDWARE PS1...</div>
        <div class="ps1-bar-container"><div id="ps1-bar-fill"></div></div>
    </div>

    <div id="game"></div>

    <script>
        // Seta de voltar nativa do celular
        window.history.pushState({page: 1}, "", ""); 
        window.addEventListener('popstate', function() { window.location.href = "index.html"; });

        const params = new URLSearchParams(window.location.search);
        const gameUrl = params.get("game");

        // --- CONFIGURAÇÕES DE ALTA PERFORMANCE ---
        window.EJS_player = '#game';
        window.EJS_core = 'pcsx_rearmed'; // O mais rápido para mobile
        window.EJS_biosUrl = 'https://pub-44d40f83db2141efb7e8a7658c74557e.r2.dev/systems/ps1/roms/scph5501.bin';
        window.EJS_gameUrl = gameUrl;
        
        // Caminho estável dos dados
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
        
        window.EJS_startOnLoaded = true;
        window.EJS_backgroundColor = "#000000";
        window.EJS_language = "pt-BR";
        window.EJS_mouse = false; // Desativa mouse pra ganhar fôlego na CPU
        window.EJS_multitap = false;

        // --- FORÇANDO CONTROLE PLAYSTATION ---
        window.EJS_VirtualGamepadSettings = { 
            buttonStyle: "playstation", // Força o visual ✖ ◯ ⬜ △
            opacity: 0.6
        };

        // --- AJUSTES DE VELOCIDADE (MATAR O LAG) ---
        window.EJS_settings = {
            "vsync": false,        // Desligar VSync tira o atraso (input lag)
            "slowdown": false,
            "audio_buffer": 2048,  // Buffer maior evita áudio craquelado em FPS baixo
            "quality": 1           // 1 = Performance, 2 = Qualidade
        };

        window.EJS_buttons = { 
            save_state: true, 
            load_state: true, 
            settings: true, 
            menu: true, 
            full_screen: false,
            fast_forward: true 
        };

        // LÓGICA DA BARRA DE LOADING
        let progress = 0;
        let barFill = document.getElementById('ps1-bar-fill');
        let loadingInterval = setInterval(() => {
            let remaining = 98 - progress;
            progress += remaining * 0.01; 
            if(barFill) barFill.style.width = progress + '%';
        }, 100);

        window.EJS_onGameStart = function() {
            clearInterval(loadingInterval);
            if(barFill) barFill.style.width = '100%';
            setTimeout(() => {
                const loader = document.getElementById('loader-overlay');
                if(loader) loader.style.display = 'none';
            }, 300);
        };

        // LIMPEZA TOTAL DE CACHE DE OUTROS CONTROLES
        localStorage.clear();
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
