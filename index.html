<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoTerminalRoom</title>
    <link rel="icon" type="image/gif" href="assets/imagens-videos/logo-discord.gif?v=2">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Press+Start+2P&display=block" rel="stylesheet">
        
    <style>
        /* VARIÁVEIS DE CORES */
        :root {
            --bg-color: #f4f4f9;
            --sidebar-bg: #ffffff;
            --accent-color: #009933;     
            --text-color: #1a1a1a;
            --text-muted: #555;
            --border-color: #cccccc;
            --card-bg: #e6e6e6;
            --input-bg: #f0f0f0;
            --top-bar-bg: rgba(255, 255, 255, 0.85);
            --grid-glow: rgba(0, 153, 51, 0.15);
            --grid-line: rgba(0, 153, 51, 0.1);
            --scroll-btn-bg: rgba(255,255,255,0.7);
                
            --sidebar-collapsed-width: 65px;
            --sidebar-expanded-width: 300px;
            --card-width-desktop: 260px;
            --card-height-desktop: 180px;
        }

        body.dark-theme {
            --bg-color: #0a0a0c;
            --sidebar-bg: #000000;
            --accent-color: #00cc44;
            --text-color: #e0e0e0;
            --text-muted: #aaa;
            --border-color: #333;
            --card-bg: #111;
            --input-bg: #222;
            --top-bar-bg: rgba(10, 10, 12, 0.85);
            --grid-glow: rgba(0, 204, 68, 0.08);
            --grid-line: rgba(0, 204, 68, 0.05);
            --scroll-btn-bg: rgba(0,0,0,0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
            
        body {
            background-color: var(--bg-color);
            background-image:     
                radial-gradient(circle at 50% 50%, var(--grid-glow) 0%, transparent 80%),
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 100vw 100vh, 30px 30px, 30px 30px;
            background-position: center center, center center, center center;
            background-attachment: fixed;
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.4s, color 0.4s;
        }

        #loader-overlay { position: fixed; inset: 0; background: var(--sidebar-bg); z-index: 100000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .loader-text { color: var(--accent-color); font-family: 'Press Start 2P'; margin-top: 20px; animation: blink 1s infinite; text-align: center; line-height: 1.5; padding: 0 10px; }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--border-color); border-top: 5px solid var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
            
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100000; justify-content: center; align-items: center; backdrop-filter: blur(5px); padding: 20px; }
        .modal-content { background: #111; border: 2px solid var(--accent-color); padding: 25px; border-radius: 8px; width: 100%; max-width: 500px; color: #e0e0e0; font-family: monospace; box-shadow: 0 0 30px rgba(0,204,68,0.5); text-align: center; max-height: 90dvh; overflow-y: auto; scrollbar-width: none; }
        .modal-content::-webkit-scrollbar { display: none; }
        .modal-content h2 { color: var(--accent-color); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-family: 'Press Start 2P', monospace; font-size: 14px; line-height: 1.5;}
        .modal-content p { line-height: 1.6; font-size: 13px; margin-top: 15px; color: #ccc;}
        .disc-btn { background: var(--accent-color); color: #000; border: none; padding: 12px 20px; font-weight: bold; font-size: 14px; cursor: pointer; font-family: 'Press Start 2P', monospace; border-radius: 3px; width: 100%; transition: 0.3s; outline: none; margin-top: 10px; }
        .disc-btn:hover, .disc-btn.gamepad-focus { background: #fff; box-shadow: 0 0 15px #fff; transform: scale(1.02); }
        .cancel-btn { background: #333; color: #fff; border: 1px solid #555; margin-top: 20px; }
        .cancel-btn:hover, .cancel-btn.gamepad-focus { background: #555; color: #fff; box-shadow: 0 0 15px #555; transform: scale(1.02); border-color: #fff; }

        #splash-screen { position: fixed; inset: 0; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 1000000; transition: opacity 0.8s ease-out, visibility 0.8s; }
        .splash-logo { font-family: 'Press Start 2P', monospace; font-size: clamp(20px, 4vw, 40px); color: var(--accent-color); display: flex; align-items: flex-end; white-space: nowrap; }
        .initial { font-weight: bold; }
        .reveal { display: inline-block; max-width: 0; opacity: 0; overflow: hidden; transition: max-width 1.5s ease-in-out, opacity 1.5s ease-in-out; vertical-align: bottom; font-size: clamp(16px, 3.5vw, 32px); margin-bottom: 2px; }
        .cursor { animation: blink-cursor 1s step-end infinite; margin-left: 5px; }
        @keyframes blink-cursor { 50% { opacity: 0; } }
        .splash-logo.animate .reveal { max-width: 300px; opacity: 1; }
        #splash-screen.fade-out { opacity: 0; visibility: hidden; }

        .sidebar { width: var(--sidebar-collapsed-width); background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; position: fixed; height: 100%; z-index: 5000; padding: 10px 5px; transition: width 0.3s ease, background 0.4s; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
        .sidebar::-webkit-scrollbar { display: none; }
        @media(min-width: 769px) {
            .sidebar:hover { width: var(--sidebar-expanded-width); box-shadow: 10px 0 50px rgba(0,0,0,0.5); }
            .sidebar:hover .nav-text { display: inline-block; opacity: 1; transition: 0.3s; }
            .sidebar:hover .menu-label { opacity: 0; }
        }
        .sidebar-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; flex-shrink: 0; }
        .sidebar-header img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent-color); cursor: pointer; }
        .menu-label { font-family: 'Press Start 2P'; font-size: 8px; color: var(--text-color); margin-top: 8px; text-align: center; display: block; transition: 0.2s; cursor: pointer; }
        .nav-list { display: flex; flex-direction: column; gap: 10px; flex: 1; margin-top: 10px; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 10px; border-radius: 8px; cursor: pointer; color: var(--text-muted); justify-content: center; flex-shrink: 0; transition: 0.3s; }
        @media(min-width: 769px) { .nav-item { justify-content: flex-start; } }
        .nav-item:hover { background: rgba(0, 204, 68, 0.2); color: var(--text-color); }
        .nav-item img { width: 28px; height: 28px; object-fit: contain; flex-shrink: 0; image-rendering: pixelated; }
        .nav-text { display: none; opacity: 0; font-size: 11px; font-weight: bold; text-transform: uppercase; white-space: nowrap; }

        .main-content { margin-left: var(--sidebar-collapsed-width); padding: 0 0 50px 0; position: relative; z-index: 1; transition: margin-left 0.3s ease; }
            
        /* ==========================================
           TOP BAR (CORRIGIDA E BLINDADA CONTRA VAZAMENTO)
           ========================================== */
        .top-bar { 
            position: sticky; top: 0; padding: 15px 20px; 
            display: flex; flex-direction: column; 
            align-items: center; gap: 15px; 
            z-index: 8000; background: var(--top-bar-bg); 
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 204, 68, 0.3); 
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); transition: background 0.4s; 
        }
        
        @keyframes brand-glow { 0%, 100% { text-shadow: 0 0 5px var(--accent-color), 0 0 15px var(--accent-color); } 50% { text-shadow: 0 0 2px var(--accent-color); } }
        .brand { font-family: 'Press Start 2P'; color: var(--accent-color); font-size: clamp(14px, 3vw, 20px); cursor: pointer; text-align: center; animation: brand-glow 2.5s infinite ease-in-out; }
        
        /* Controles alinhados abaixo da Brand */
        .top-bar-controls { 
            display: flex; flex-direction: row; align-items: center; justify-content: center; 
            gap: 10px; width: 100%; max-width: 800px; 
        }
        
        /* Botão Chat Mobile com TRAVA MÁXIMA DE TAMANHO */
        .chat-trigger-mobile { 
            display: flex; 
            width: 40px; height: 40px; 
            min-width: 40px; min-height: 40px; 
            cursor: pointer; align-items: center; justify-content: center; 
            border: 1px solid var(--accent-color); border-radius: 6px; 
            background: var(--sidebar-bg); flex-shrink: 0; transition: 0.3s; 
        }
        .chat-trigger-mobile img { 
            width: 25px !important; height: 25px !important; 
            max-width: 25px !important; max-height: 25px !important; 
            object-fit: contain; image-rendering: pixelated; 
        }
        .chat-trigger-mobile:hover { background: var(--accent-color); }

        /* Barra de pesquisa elástica para não escapar da tela */
        .search-container { 
            background: var(--sidebar-bg); border: 1px solid var(--accent-color); 
            display: flex; padding: 8px 15px; 
            flex: 1; min-width: 100px; max-width: 500px; 
            border-radius: 4px; position: relative; 
        }
        #global-search { background: transparent; border: none; color: var(--text-color); outline: none; width: 100%; font-family: monospace; }
        #search-results { position: absolute; top: 100%; right: -1px; width: calc(100% + 2px); background: var(--sidebar-bg); border: 1px solid var(--accent-color); display: none; flex-direction: column; z-index: 9999; max-height: 400px; overflow-y: auto; border-radius: 0 0 4px 4px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .search-item { padding: 10px; border-bottom: 1px solid var(--border-color); cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .search-item:hover, .search-item.gamepad-focus { background: var(--card-bg); border-left: 3px solid var(--accent-color); outline: none; }
        .search-item img { width: 40px; height: 40px; object-fit: fill; border-radius: 3px; }

        .theme-container { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .theme-switch { position: relative; display: inline-block; width: 46px; height: 24px; cursor: pointer; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background-color: var(--input-bg); transition: .4s; border-radius: 34px; border: 1px solid var(--accent-color); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: var(--accent-color); transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(22px); }

        /* ==========================================
           CHAT MODAL (COM CORES FORTES E EMOJIS)
           ========================================== */
        .chat-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .chat-window { background: var(--sidebar-bg); border: 2px solid var(--accent-color); padding: 20px; border-radius: 8px; width: 90%; max-width: 450px; height: 75vh; max-height: 500px; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 40px rgba(0, 204, 68, 0.5); }
        .close-chat-btn { position: absolute; top: 10px; right: 10px; background: transparent; color: #ff3333; border: 1px solid #ff3333; font-family: monospace; font-size: 16px; padding: 4px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .close-chat-btn:hover { background: #ff3333; color: #fff; }
        
        .chat-title { font-size: 16px; color: #00ff44; text-shadow: 0 0 8px rgba(0, 255, 68, 0.8); text-align: center; margin-bottom: 10px; font-weight: bold; font-family: 'Press Start 2P', monospace; padding-top: 10px; }
        
        #terminal-output { flex: 1; overflow-y: auto; font-family: monospace; font-size: 12px; color: #00ff44; margin-bottom: 15px; border: 1px solid var(--border-color); padding: 10px; background: var(--bg-color); border-radius: 4px; word-wrap: break-word; }
        .chat-controls { display: flex; gap: 8px; width: 100%; position: relative; }
        #chat-nick { width: 80px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px; font-size: 12px; border-radius: 4px; outline: none; }
        #chat-msg { flex: 1; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px; font-size: 12px; border-radius: 4px; outline: none; }
        #chat-msg:disabled { background: var(--card-bg); cursor: not-allowed; opacity: 0.5; }
        #emoji-btn { background: var(--input-bg); border: 1px solid var(--border-color); cursor: pointer; padding: 0 10px; border-radius: 4px; font-size: 16px; transition: 0.2s; }
        #emoji-btn:hover { background: var(--card-bg); }
        #send-btn { width: 45px; background: var(--accent-color); border: none; cursor: pointer; color: #fff; font-weight: bold; border-radius: 4px; font-size: 16px; }
        
        /* CAIXA DE EMOJIS FLUTUANTE */
        #emoji-picker { display: none; position: absolute; bottom: 50px; right: 50px; background: var(--sidebar-bg); border: 1px solid var(--accent-color); padding: 10px; border-radius: 6px; width: 200px; flex-wrap: wrap; gap: 10px; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 100001; }
        .emoji-item { cursor: pointer; font-size: 20px; transition: 0.2s; }
        .emoji-item:hover { transform: scale(1.3); }

        .hero-section { position: relative; width: 100%; height: 600px; background: #000; overflow: hidden; display: flex; align-items: center; }
        .hero-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; display: flex; align-items: center; z-index: 1; }
        .hero-slide.active { opacity: 1; z-index: 2; }
        .hero-bg-blur { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; object-fit: cover; filter: blur(25px) brightness(0.5); z-index: 1; pointer-events: none; }
        .hero-bg-media { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 2; pointer-events: none; }
        .hero-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to right, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 60%, transparent 100%), linear-gradient(to top, var(--bg-color) 0%, transparent 40%); z-index: 3; transition: background 0.4s; pointer-events: none; }
        .hero-content { position: relative; z-index: 4; padding: 0 50px; max-width: 800px; display: flex; flex-direction: column; gap: 15px; }
        .hero-title { font-family: 'Press Start 2P', cursive; font-size: clamp(20px, 4vw, 36px); color: #fff; text-shadow: 2px 2px 10px #000; line-height: 1.3; margin-bottom: 5px; }
        .hero-play-btn { background: #fff; color: #000; font-family: 'Press Start 2P'; font-size: 14px; padding: 15px 30px; border-radius: 4px; border: none; cursor: pointer; width: fit-content; transition: 0.3s; margin-top: 10px; }
        .hero-play-btn:hover { background: var(--accent-color); color: #fff; transform: scale(1.05); }

        .catalog { padding: 0 40px; }
        .row-wrapper { margin-top: 40px; }
        .row-header { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; border-left: 4px solid var(--accent-color); padding-left: 15px; }
        .row-title-text { font-family: 'Press Start 2P'; font-size: 14px; color: var(--text-color); }
        .game-carousel { display: flex; gap: 15px; overflow-x: auto; padding: 25px 5px; scrollbar-width: none; }
        .game-card { width: var(--card-width-desktop); height: var(--card-height-desktop); border: 1px solid var(--border-color); cursor: pointer; border-radius: 8px; flex-shrink: 0; overflow: hidden; transition: 0.3s; position: relative; }
        .game-card:hover { transform: scale(1.15); border-color: var(--accent-color); z-index: 100; box-shadow: 0 0 25px rgba(0,204,68,0.4); }
        .game-card.mobile-active { transform: scale(1.25); border-color: var(--accent-color); z-index: 100; box-shadow: 0 0 25px rgba(0,204,68,0.6); }
        .card-media { width: 100%; height: 130px; background: #000; position: relative; }
        .card-media img { width: 100%; height: 100%; object-fit: fill; position: absolute; top: 0; left: 0; transition: opacity 0.2s; }
        .static-thumb { z-index: 2; opacity: 1; }
        .active-gif { z-index: 3; opacity: 0; display: none; }      
        .card-title { height: 40px; background: var(--card-bg); display: flex; align-items: center; justify-content: center; padding: 5px; font-family: 'Press Start 2P'; font-size: 8px; text-align: center; z-index: 5; position: relative; }

        .discord-float { position: fixed; bottom: 20px; right: 20px; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 50px; border: 1px solid #5865f2; text-decoration: none; z-index: 9999; backdrop-filter: blur(5px); transition: bottom 0.3s ease; }
        .discord-text { font-family: monospace; color: #fff; font-size: 12px; text-align: right; }
        .discord-float img { width: 45px; height: 45px; border-radius: 50%; }

        @media (max-width: 768px) {
            .sidebar { top: auto; bottom: 0; left: 0; width: 100% !important; height: 65px; flex-direction: row; border-right: none; border-top: 1px solid var(--accent-color); padding: 5px 0; transform: none !important; z-index: 9000; background: var(--top-bar-bg); backdrop-filter: blur(10px); box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }      
            .sidebar-header { display: none !important; }
            .nav-list { flex-direction: row; margin-top: 0; gap: 0; overflow-x: hidden; justify-content: space-around; padding: 0 5px; width: 100%; align-items: center; }
            .nav-item { flex-direction: column; padding: 2px 0; flex: 1; gap: 4px; justify-content: center; border-radius: 4px; }
            .nav-item img { width: 22px; height: 22px; margin: 0; }
            .nav-text { display: block !important; opacity: 1 !important; font-size: 6px !important; text-align: center; white-space: normal !important; line-height: 1.1; word-break: break-word; }
            
            .main-content { margin-left: 0 !important; padding: 0 0 80px 0 !important; }
            
            /* Ajustes Mobile Top Bar */
            .top-bar { padding: 10px 10px !important; gap: 10px !important; }
            .brand { margin-bottom: 0px; }
            .top-bar-controls { gap: 8px !important; }
            .search-container { padding: 8px 10px !important; flex: 1; min-width: 0; }
            
            .hero-section { height: 350px; }
            .catalog { padding: 0 15px; }
            .game-card { width: 140px; height: 120px; }
            .card-media { height: 85px; }
            .discord-float { bottom: 80px; right: 10px; }
            .discord-text { display: none; }
            .discord-float img { width: 35px; height: 35px; }
        }
    </style>
</head>
<body class="dark-theme">

    <script>
        // SCRIPT DE ANUNCIO ADSTERRA
        function dispararAnuncio() {
            console.log("Sistema: Disparando Anúncio Social Bar...");
        }
        window.onload = function() { setTimeout(function() { dispararAnuncio(); }, 10000); };
    </script>

    <div id="splash-screen"><h1 class="splash-logo">NEO TERMINAL_</h1></div>
    <div id="loader-overlay"><div class="spinner"></div></div>

    <a href="https://discord.com/invite/6sqENZGFqB" class="discord-float" target="_blank">
        <div class="discord-text">Junte-se a nós<br><strong>DISCORD</strong></div>
        <img src="assets/imagens-videos/discord.gif?v=3" alt="Discord">
    </a>

    <div id="m3u-modal" class="modal">
        <div class="modal-content">
            <h2><img src="assets/imagens-videos/menu/interrogacao.png" alt="?" style="width: 22px; vertical-align: middle; margin-right: 8px; image-rendering: pixelated;" onerror="this.style.display='none'">SELECIONE O DISCO</h2>
            <div id="disc-buttons-container" style="display: flex; flex-direction: column; margin-top: 15px; gap: 8px;"></div>
        </div>
    </div>

    <div id="chat-modal-overlay" class="chat-modal-overlay">
        <div class="chat-window">
            <button class="close-chat-btn" onclick="closeMobileChat()">X</button>
            <div class="chat-title">CHAT GLOBAL</div>
            <div id="terminal-output"></div>
            
            <div class="chat-controls">
                <input id="chat-nick" placeholder="Nick" maxlength="10">
                <input id="chat-msg" placeholder="Mensagem..." disabled>
                <button id="emoji-btn" title="Inserir Emoji">😀</button>
                <button id="send-btn">➤</button>
                
                <div id="emoji-picker">
                    <span class="emoji-item">😀</span> <span class="emoji-item">😂</span>
                    <span class="emoji-item">😎</span> <span class="emoji-item">😍</span>
                    <span class="emoji-item">🎮</span> <span class="emoji-item">👾</span>
                    <span class="emoji-item">💀</span> <span class="emoji-item">🔥</span>
                    <span class="emoji-item">👍</span> <span class="emoji-item">🚀</span>
                </div>
            </div>
        </div>
    </div>

    <div class="app-container" id="app-container">
        <nav class="sidebar" id="main-sidebar">
            <div class="sidebar-header">
                <img src="assets/imagens-videos/logo-discord.gif?v=2" onclick="window.scrollTo(0,0);" title="Voltar ao Topo">
            </div>
            <div class="nav-list" id="nav-list"></div>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <div class="brand" onclick="window.scrollTo(0,0)">NEOTERMINALROOM</div>
                
                <div class="top-bar-controls">
                    <div class="chat-trigger-mobile" onclick="openMobileChat()" title="Abrir Chat Global">
                        <img src="assets/imagens-videos/imagens do menu/chat.png" alt="Chat">
                    </div>
                    
                    <div class="search-container">
                        <span style="color:var(--accent-color); margin-right:10px;">#</span>
                        <input type="text" id="global-search" placeholder="buscar jogo..." autocomplete="off">
                        <div id="search-results"></div>
                    </div>
                        
                    <div class="theme-container">
                        <label class="theme-switch" title="Mudar Tema">
                            <input type="checkbox" id="theme-toggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </header>
            
            <section class="hero-section" id="hero-slider">
                <div class="hero-indicators" id="hero-indicators"></div>
            </section>
            <section class="catalog" id="catalog-area"></section>
        </main>
    </div>

<script type="module">
    document.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => document.querySelector(".splash-logo").classList.add("animate"), 500);
        setTimeout(() => document.getElementById("splash-screen").classList.add("fade-out"), 2500);
    });

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const R2_URL = "https://pub-44d40f83db2141efb7e8a7658c74557e.r2.dev/";  
    const blockRegex = /\.m3u|([._\-\s](cd|disc|disco)\s*0?[2-9])|([._\-\s](cd|disc|disco)\s*1[0-9])/i;

    const themeToggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-theme'); themeToggle.checked = true; }
    themeToggle.addEventListener('change', () => {
        if (themeToggle.checked) { document.body.classList.add('dark-theme'); localStorage.setItem('theme', 'dark'); }   
        else { document.body.classList.remove('dark-theme'); localStorage.setItem('theme', 'light'); }
    });

    const firebaseConfig = { apiKey: "AIzaSyCx_OllbDYkua9BbMOj2oJP5V1UcbxmnbI", databaseURL: "https://neoterminalroom-default-rtdb.firebaseio.com", projectId: "neoterminalroom" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const chatRef = ref(db, 'mensagens');

    window.startGame = (url) => { triggerLoad(url); };

    function triggerLoad(url) {
        if (typeof dispararAnuncio === "function") { dispararAnuncio(); }
        document.getElementById('loader-overlay').style.display = 'flex';
        setTimeout(() => { window.location.href = url; }, 1500);
    }

    // LÓGICA DA JANELA DE CHAT
    window.openMobileChat = () => { document.getElementById('chat-modal-overlay').style.display = 'flex'; };
    window.closeMobileChat = () => { 
        document.getElementById('chat-modal-overlay').style.display = 'none'; 
        document.getElementById('emoji-picker').style.display = 'none'; 
    };
    document.getElementById('chat-modal-overlay').addEventListener('click', (e) => {
        if (e.target.id === 'chat-modal-overlay') window.closeMobileChat();
    });

    // LÓGICA DOS EMOJIS
    document.getElementById('emoji-btn').onclick = () => {
        const picker = document.getElementById('emoji-picker');
        picker.style.display = picker.style.display === 'none' || picker.style.display === '' ? 'flex' : 'none';
    };
    document.querySelectorAll('.emoji-item').forEach(item => {
        item.onclick = (e) => {
            const msgInput = document.getElementById('chat-msg');
            if(!msgInput.disabled) { msgInput.value += e.target.innerText; }
            document.getElementById('emoji-picker').style.display = 'none';
        };
    });

    const out = document.getElementById("terminal-output");
    const nickInput = document.getElementById("chat-nick");
    const msgInput = document.getElementById("chat-msg");
    const sendBtn = document.getElementById("send-btn");

    if(localStorage.getItem("neo_nick")) { nickInput.value = localStorage.getItem("neo_nick"); msgInput.disabled = false; }
    nickInput.oninput = () => { msgInput.disabled = (nickInput.value.trim().length === 0); };

    onChildAdded(chatRef, (snap) => {
        const d = snap.val();
        out.innerHTML += `<div><strong style="color:#fff;">[${d.user}]</strong>: <span style="color:#00ff44;">${d.text}</span></div>`;
        out.scrollTop = out.scrollHeight;
    });

    function sendMessage() {
        const user = nickInput.value.trim();
        const text = msgInput.value.trim();
        if(!user) { alert("Digite um Nick primeiro!"); return; }
        if(!text) return;
        localStorage.setItem("neo_nick", user);
        push(chatRef, {user, text, timestamp: serverTimestamp()});
        msgInput.value = "";
    }
    sendBtn.onclick = sendMessage;
    msgInput.onkeydown = (e) => { if(e.key === "Enter") sendMessage(); }

    const topGames = [
        { nome: 'Super Mario World', sys: 'snes', rom: 'systems/snes/roms/super_mario_world_(usa).zip', img: 'assets/wallpapers_hero/super_mario_world.jpg' },
        { nome: 'Sonic the Hedgehog', sys: 'megadrive', rom: 'systems/megadrive/roms/sonic_the_hedgehog_(usa,_europe).md', img: 'assets/wallpapers_hero/sonic-the-hedgehog.jpg' },
        { nome: 'Resident Evil 2', sys: 'ps1', rom: 'systems/ps1/roms/resident_evil_2.bin', img: 'assets/wallpapers_hero/resident-evil-2.jpg' }
    ];

    const systems = [
        { id: 'nes', name: 'NES', path:'systems/nes/', icon: 'assets/imagens-videos/imagens do menu/nitendinho.png'},
        { id: 'snes', name: 'SNES', path:'systems/snes/', icon: 'assets/imagens-videos/imagens do menu/supernitendo.png'},
        { id: 'n64', name: 'N64', path: 'systems/n64/', icon: 'assets/imagens-videos/imagens do menu/n64.png'},
        { id: 'gba', name: 'GBA', path: 'systems/gba/', icon: 'assets/imagens-videos/imagens do menu/gba.png'},
        { id: 'megadrive', name: 'MEGA DRIVE', path: 'systems/megadrive/', icon: 'assets/imagens-videos/imagens do menu/megadrive.png'},
        { id: 'ps1', name: 'PS1', path: 'systems/ps1/', icon: 'assets/imagens-videos/imagens do menu/ps1.png'}
    ];

    let indexData = [];
    const catalog = document.getElementById("catalog-area");
    const navList = document.getElementById("nav-list");

    const hero = document.getElementById('hero-slider');
    topGames.forEach((g, i) => {
        const slide = document.createElement('div');
        slide.className = `hero-slide ${i === 0 ? 'active' : ''}`;
        slide.innerHTML = `<img src="${g.img}" class="hero-bg-media"><div class="hero-overlay"></div><div class="hero-content"><h1 class="hero-title">${g.nome}</h1><button class="hero-play-btn selectable-item" onclick="window.startGame('player-universal.html?game=${encodeURIComponent(R2_URL+g.rom)}&core=${g.sys === 'ps1' ? 'psx' : g.sys}')">JOGAR AGORA</button></div>`;
        hero.appendChild(slide);
        const dot = document.createElement('div'); dot.className = `indicator ${i === 0 ? 'active' : ''}`;
        dot.onclick = () => { document.querySelectorAll('.hero-slide').forEach(s => s.classList.remove('active')); slide.classList.add('active'); };
        document.getElementById('hero-indicators').appendChild(dot);
    });

    setInterval(() => {
        const slides = document.querySelectorAll('.hero-slide');
        const dots = document.querySelectorAll('.indicator');
        let active = 0;
        slides.forEach((s,i) => { if(s.classList.contains('active')) active = i; });
        slides[active].classList.remove('active'); dots[active].classList.remove('active');
        const next = (active + 1) % slides.length;
        slides[next].classList.add('active'); dots[next].classList.add('active');
    }, 5000);

    // ==========================================
    // SISTEMA DE GIFS: LOOP 1.5s E LIMPEZA MOBILE
    // ==========================================
    let globalHoverTimeout;
    let globalGifInterval;
    let activeCardMobile = null;

    const resetGif = (cardElement) => {
        if(!cardElement) return;
        const s = cardElement.querySelector('.static-thumb');
        const a = cardElement.querySelector('.active-gif');
        if(s) s.style.opacity = '1'; 
        if(a) { a.style.opacity = '0'; setTimeout(() => { if(a.style.opacity === '0') a.style.display = 'none'; }, 200); }
    };

    const playGifWithDelay = (cardElement) => {
        // Se clicar em outro card no mobile, limpa o anterior na hora
        if (activeCardMobile && activeCardMobile !== cardElement) {
            activeCardMobile.classList.remove('mobile-active');
            resetGif(activeCardMobile);
        }
        activeCardMobile = cardElement;

        const s = cardElement.querySelector('.static-thumb');
        const a = cardElement.querySelector('.active-gif');
        
        clearTimeout(globalHoverTimeout);   
        clearInterval(globalGifInterval);
        
        if (!a || !a.dataset.gif) return; 
        
        const showCoverAndWait = () => { 
            s.style.opacity = '1'; a.style.opacity = '0'; 
            setTimeout(() => { if(a.style.opacity === '0') a.style.display = 'none'; }, 200); 
        };
        const showGifAndWait = () => { 
            a.src = a.dataset.gif; a.style.display = 'block'; 
            setTimeout(() => { s.style.opacity = '0'; a.style.opacity = '1'; }, 50); 
        };

        // Inicia rápido e repete o loop a cada 1.5s cravado
        globalHoverTimeout = setTimeout(() => { 
            showGifAndWait();
            globalGifInterval = setInterval(() => {
                showCoverAndWait();
                setTimeout(showGifAndWait, 300); // 300ms na capa, o resto no gif
            }, 1500); 
        }, 300);   
    };

    systems.forEach(sys => {
        const navItem = document.createElement("div"); navItem.className = "nav-item";
        navItem.innerHTML = `<img src="${sys.icon}"><span class="nav-text">${sys.name}</span>`;
        navItem.onclick = () => window.scrollTo({ top: document.getElementById(`sec-${sys.id}`).offsetTop - 80, behavior: 'smooth' });
        navList.appendChild(navItem);

        const wrap = document.createElement("div"); wrap.id = `sec-${sys.id}`; wrap.className="row-wrapper";
        wrap.innerHTML = `<div class="row-header"><span class="row-title-text">${sys.name}</span></div><div class="game-carousel" id="car-${sys.id}"></div>`;
        catalog.appendChild(wrap);

        fetch(`${sys.path}games.json?v=${Date.now()}`).then(r => r.json()).then(games => {
            const car = document.getElementById(`car-${sys.id}`);
            games.forEach(g => {
                if (sys.id === 'ps1' && blockRegex.test((g.rom + ' ' + g.nome).toLowerCase())) return;
                indexData.push({...g, sysId: sys.id, sysPath: sys.path});
                
                const card = document.createElement("div"); card.className = "game-card selectable-item";
                const capa = g.capa ? g.capa.split('/').pop() : '';
                const gifNome = g.preview ? g.preview.split('/').pop() : '';
                const imgPath = capa ? `${R2_URL}${sys.path}capas/${capa}` : '';
                const gifPath = gifNome ? `${R2_URL}${sys.path}previews/${gifNome}` : '';
                const playUrl = `player-universal.html?nocache=${Date.now()}&game=${encodeURIComponent(R2_URL + sys.path + g.rom)}&core=${sys.id === 'ps1' ? 'psx' : sys.id}`;
                
                card.innerHTML = `
                    <div class="card-media">
                        <img src="${imgPath}" onerror="this.onerror=null; this.src='assets/imagens-videos/logo-discord.gif';" class="static-thumb" loading="lazy">
                        <img src="" data-gif="${gifPath}" class="active-gif">
                    </div>
                    <div class="card-title"><span>${g.nome}</span></div>
                `;

                if (window.innerWidth <= 768) {
                    card.onclick = (e) => {
                        if (card.classList.contains('mobile-active')) { window.startGame(playUrl); return; }
                        card.classList.add('mobile-active');
                        playGifWithDelay(card);
                    };
                } else {
                    card.onmouseenter = () => playGifWithDelay(card);
                    card.onmouseleave = () => {
                        clearTimeout(globalHoverTimeout);
                        clearInterval(globalGifInterval);
                        resetGif(card);
                    };
                    card.onclick = () => window.startGame(playUrl);
                }
                car.appendChild(card);
            });
        });
    });

    const sIn = document.getElementById('global-search');
    const sRes = document.getElementById('search-results');
    sIn.oninput = (e) => {
        const val = e.target.value.toLowerCase();
        sRes.innerHTML = '';
        if(!val) { sRes.style.display = 'none'; return; }
        const hits = indexData.filter(g => g.nome.toLowerCase().includes(val) && (g.sysId !== 'ps1' || !blockRegex.test((g.rom + g.nome).toLowerCase()))).slice(0,10);
        if(hits.length) {
            sRes.style.display = 'flex';
            hits.forEach(h => {
                const div = document.createElement('div'); div.className = 'search-item selectable-item';
                div.innerHTML = `<span>${h.nome} [${h.sysId.toUpperCase()}]</span>`;
                div.onclick = () => window.startGame(`player-universal.html?game=${encodeURIComponent(R2_URL+h.sysPath+h.rom)}&core=${h.sysId === 'ps1' ? 'psx' : h.sysId}`);
                sRes.appendChild(div);
            });
        }
    };
    document.addEventListener('click', (e) => { if (!e.target.closest('.search-container')) sRes.style.display = 'none'; });
</script>
</body>
</html>
