<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>NeoTerminal Room - Player</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-touch-fullscreen" content="yes">
    
    <style>
        html, body { margin: 0; background: #000; width: 100%; height: 100dvh; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        #game { width: 100vw; height: 100dvh; background-color: #000; }
        
        /* TELA DE LOADING */
        #loader-overlay { position: fixed; inset: 0; background: #000; z-index: 9999998; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; pointer-events: none; }
        #ps1-text { color: #fff; font-family: 'Courier New', monospace; font-size: 16px; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; text-align: center; line-height: 1.5; }
        
        .ps1-bar-container { width: 280px; height: 15px; border: 2px solid #fff; padding: 2px; background: #000; }
        
        /* A MÁGICA VISUAL DA BARRA (Listras em movimento contínuo) */
        #ps1-bar-fill { 
            width: 0%; height: 100%; 
            background: linear-gradient(45deg, #00ff44 25%, #00cc33 25%, #00cc33 50%, #00ff44 50%, #00ff44 75%, #00cc33 75%, #00cc33 100%);
            background-size: 20px 20px;
            animation: moveStripes 1s linear infinite;
            transition: width 0.1s linear; 
        }
        
        @keyframes moveStripes {
            0% { background-position: 0 0; }
            100% { background-position: 20px 0; }
        }

        .blink { animation: blink 1.5s infinite; color: #00ff44;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <script>
        function dispararAnuncio() { console.log("Sistema: Anúncio do Player Iniciado..."); }
    </script>

    <div id="loader-overlay">
        <div id="ps1-text">
            NOW LOADING<span id="loading-dots">...</span><br>
            <span class="blink" style="font-size: 12px;">[ AGUARDE A EXTRAÇÃO DO DISCO ]</span>
        </div>
        <div class="ps1-bar-container">
            <div id="ps1-bar-fill"></div>
        </div>
    </div>

    <div id="game"></div>

    <script>
        // ==========================================
        // LÓGICA DA SETA DE VOLTAR (Navegador/Celular)
        // ==========================================
        window.history.pushState({page: 1}, "", ""); // Empurra um estado falso pra fila
        window.addEventListener('popstate', function(event) {
            // Se o usuário apertar voltar, manda pro index.html
            window.location.href = "index.html";
        });

        // Pega os parâmetros do jogo
        const params = new URLSearchParams(window.location.search);
        const core = params.get("core");   
        const game = params.get("game");

        // ==========================================
        // LOADING ASSINTÓTICO + PONTINHOS ANIMADOS
        // ==========================================
        let progress = 0;
        let dotCount = 0;
        let barFill = document.getElementById('ps1-bar-fill');
        let dotsEl = document.getElementById('loading-dots');
        let textEl = document.getElementById('ps1-text');
        
        let loadingInterval = setInterval(() => {
            // A barra nunca para de atualizar matematicamente
            let remaining = 99.5 - progress;
            let speed = (core === 'psx' || core === 'pcsx_rearmed') ? 0.005 : 0.05;
            progress += remaining * speed;
            if(barFill) barFill.style.width = progress + '%';
            
            // Anima os três pontinhos pra dar sensação de atividade
            dotCount = (dotCount + 1) % 4;
            if(dotsEl) dotsEl.innerText = ".".repeat(dotCount);
        }, 50); // Atualiza a cada 50ms para ser super fluido

        if (core && game) {
            const baseUrl = window.location.origin + '/';
            window.EJS_player = '#game';
            window.EJS_core = core;   
            window.EJS_backgroundColor = "#000000";

            // LIMPEZA NUCLEAR DO CACHE DO EMULATORJS PARA FORÇAR O CONTROLE CERTO
            try { 
                for (let key in localStorage) { 
                    if (key.includes('emulatorjs') || key.includes('EJS')) {
                        localStorage.removeItem(key); 
                    }
                } 
            } catch(e) {}

            window.EJS_onGameStart = function() {
                clearInterval(loadingInterval);
                if(barFill) {
                    barFill.style.width = '100%';
                    barFill.style.animation = 'none'; // Para as listras
                }
                if(textEl) textEl.innerHTML = "<span style='color:#00ff44;'>START!</span>";
                
                dispararAnuncio(); 

                setTimeout(() => {
                    const loader = document.getElementById('loader-overlay');
                    if(loader) { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 500); }
                }, 500);
            };

            window.EJS_gameUrl = game.trim().startsWith("http") ? game.trim() : baseUrl + game.trim();
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_startOnLoaded = true;
            window.EJS_language = "pt-BR";
            window.EJS_loadStateOnStart = false;    
            
            // Agora o emulador só vai ter botão de Menu e Config na interface interna dele
            window.EJS_buttons = { save_state: true, load_state: true, full_screen: true, fast_forward: true, settings: true, menu: true };
            window.EJS_defaultOptions = { "vsync": false };

            // ==========================================
            // FORÇANDO O CONTROLE DO PLAYSTATION
            // ==========================================
            if (core === 'psx' || core === 'pcsx_rearmed') {
                window.EJS_biosUrl = 'https://pub-44d40f83db2141efb7e8a7658c74557e.r2.dev/systems/ps1/roms/scph5501.bin';
                
                // Força nas duas variáveis conhecidas do EmulatorJS
                window.EJS_gamepadStyle = "playstation";
                window.EJS_VirtualGamepadSettings = { 
                    opacity: 0.5, 
                    hideOnKeyboardInfo: false, 
                    buttonStyle: "playstation" 
                };
            } else {
                window.EJS_VirtualGamepadSettings = { 
                    opacity: 0.5, 
                    hideOnKeyboardInfo: false, 
                    buttonStyle: "modern" 
                };
            }
        }
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
